### Ubuntu 22.04 LTS Preseed Configuration ###
### Minimal, Stable, High Performance System ###

## Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

## Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string ubuntu-minimal
d-i netcfg/get_domain string localdomain
d-i netcfg/wireless_wep string

## Mirror and repository configuration
d-i mirror/country string manual
d-i mirror/http/hostname string archive.ubuntu.com
d-i mirror/http/directory string /ubuntu
d-i mirror/http/proxy string
d-i mirror/suite string jammy

## Timezone
d-i time/zone string UTC
d-i clock-setup/utc boolean true

## Disk partitioning
d-i partman-auto/method string lvm
d-i partman-auto-lvm/new_vg_name string vg0
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

## Grub bootloader configuration
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda

## User account setup
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Ubuntu User
d-i passwd/username string ubuntu
d-i passwd/user-password password ubuntu123
d-i passwd/user-password-again password ubuntu123
d-i user-setup/encrypt-home boolean false
d-i user-setup/allow-password-auth-in-public-areas boolean true

## Apt setup (disable unnecessary repositories)
d-i apt-setup/restricted boolean false
d-i apt-setup/universe boolean false
d-i apt-setup/multiverse boolean false
d-i apt-setup/backports boolean false
d-i apt-setup/services-select multiselect none

## Package selection - MINIMAL & STABLE ONLY
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server openssh-client curl wget net-tools htop vim nano git build-essential linux-headers-generic
d-i pkgsel/exclude string xserver-xorg xserver-xorg-core xserver-xorg-video-all ubuntu-desktop gnome-shell gdm3 avahi-daemon cups rsync bind9 dnsmasq
d-i pkgsel/upgrade select safe
d-i pkgsel/update-policy select unattended-upgrades

## No language support for unneeded locales
d-i pkgsel/language-pack-patterns string
d-i pkgsel/install-language-support boolean false

## Automatic security updates
unattended-upgrades unattended-upgrades/enable_auto_updates boolean true
unattended-upgrades unattended-upgrades/automatic_reboot boolean true
unattended-upgrades unattended-upgrades/automatic_reboot_time string 02:00

## Disable unnecessary services
d-i preseed/late_command string \
  in-target systemctl disable avahi-daemon; \
  in-target systemctl disable cups; \
  in-target systemctl disable bluetooth; \
  in-target systemctl disable apport; \
  in-target systemctl disable motd-news; \
  in-target systemctl mask systemd-ask-password-plymouth.service; \
  in-target update-grub

## Finish installation
d-i finish-install/reboot_in_background boolean true
d-i cdrom-detect/eject boolean true

## Skip popularity contest
popularity-contest popularity-contest/participate boolean false

## Kernel command line optimization
d-i debian-installer/add-kernel-opts string elevator=deadline
