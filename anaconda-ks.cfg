### CentOS 8 Stream / RHEL 8+ Kickstart Configuration ###
### Enterprise, Minimal, Highly Stable ###

# Install Mode
install
text
noninteractive

# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'

# System language
lang en_US.UTF-8

# Network configuration
network  --bootproto=dhcp --device=eth0 --ipv6=auto --activate
network  --hostname=centos-minimal

# Timezone
timezone UTC --isUtc

# System bootloader configuration
bootloader --location=mbr --boot-drive=sda

# Disk partitioning strategy (LVM)
ignoredisk --only-use=sda
zerombr
clearpart --all --initlabel --drives=sda
autopart --type=lvm --nohome

# Accept EULA
eula --agreed

# Root password (disable root login, use sudo)
rootpw --lock

# User creation
user --name=centos --plaintext --password=centos123 --groups=wheel

# Firewall
firewall --enabled --service=ssh

# SELinux
selinux --enforcing

# Disable unnecessary services
services --enabled=sshd,chronyd --disabled=bluetooth,cups,avahi-daemon,ModemManager

%packages --nodefaults
@core
@standard
openssh-server
openssh-clients
curl
wget
net-tools
htop
vim
nano
git
gcc
make
kernel-devel
-avahi
-cups
-bluetooth
-ModemManager
-NetworkManager-wifi
-iwl*-firmware
%end

%post --log=/var/log/kickstart-post.log
# Enable automatic security updates
dnf install -y dnf-automatic
systemctl enable dnf-automatic.timer
systemctl start dnf-automatic.timer

# Disable unnecessary services
systemctl disable bluetooth
systemctl disable cups
systemctl mask systemd-ask-password-plymouth.service

# Optimize kernel parameters
echo "vm.swappiness = 10" >> /etc/sysctl.conf
echo "net.core.somaxconn = 1024" >> /etc/sysctl.conf
sysctl -p

# Remove unnecessary packages
dnf remove -y iwl* firmware avahi cups
dnf autoremove -y
dnf clean all

echo "Installation completed successfully"
%end

%post --nochroot --log=/mnt/sysimage/var/log/kickstart-post-nochroot.log
# Optimize grub
echo 'GRUB_TIMEOUT=3' >> /mnt/sysimage/etc/default/grub
echo 'GRUB_CMDLINE_LINUX="quiet elevator=deadline"' >> /mnt/sysimage/etc/default/grub
%end

# Reboot when finished
reboot --eject
